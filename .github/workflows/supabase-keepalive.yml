name: Supabase Keep-Alive

# TUM Supabase free-tier projelerini tek yerden canli tutar.
# Free-tier proje 7 gun GERCEK DB sorgusu almazsa pause olur; root /rest/v1/
# ping'i cache doner ve SAYILMAZ, o yuzden her projeye gercek tablo count
# sorgusu atiyoruz. Hedefler KEEPALIVE_TARGETS secret'inda (JSON).
#
# Yeni proje eklemek icin sadece secret'taki JSON'a satir ekle:
#   gh secret set KEEPALIVE_TARGETS --repo uludagv-alt/supabase-keepalive < targets.json

on:
  schedule:
    # HER GUN 06:00 UTC (09:00 Istanbul). Gunluk cunku: (1) GitHub cron
    # best-effort'tur, saatlerce gecikebilir/atlanabilir; (2) bir run fail
    # ederse haftada-2 kez'de 7 gunluk bosluk acilabilir; (3) Supabase'in
    # inactivity tespiti gun-bazli gecikmeli. Gunluk = surekli aktivite,
    # tek run kacsa bile ertesi gun telafi. Public repo'da Actions bedava.
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      force_heartbeat:
        description: 'Heartbeat commit at zorla (push iznini test etmek icin)'
        type: boolean
        default: false

# Heartbeat adimi repo'ya commit/push edebilsin diye yazma izni.
permissions:
  contents: write

jobs:
  keepalive:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Ping all Supabase projects (real DB query)
        env:
          KEEPALIVE_TARGETS: ${{ secrets.KEEPALIVE_TARGETS }}
        run: python3 .github/scripts/supabase-keepalive.py

      # GitHub PUBLIC repo'da scheduled workflow 60 gun repo COMMIT'i almazsa
      # otomatik disable olur (cron run'lari commit sayilmaz). Son commit 30
      # gunu gectiyse otomatik bos heartbeat commit'i atip 60-gun saatini
      # sifirlariz. if: always() -> bir proje pause/fail olsa bile (ping step
      # exit 1) heartbeat yine de calissin, repo canli kalsin.
      - name: Repo heartbeat (60-gun scheduled-disable onleme)
        if: always()
        run: |
          set -e
          last=$(git log -1 --format=%ct)
          age_days=$(( ( $(date +%s) - last ) / 86400 ))
          echo "Son commit ${age_days} gun once."
          if [ "${{ github.event.inputs.force_heartbeat }}" = "true" ] || [ "$age_days" -ge 30 ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git commit --allow-empty -m "chore: keepalive heartbeat (60-gun scheduled-disable onleme)"
            git push
            echo "Heartbeat commit atildi + push edildi (60-gun saati sifirlandi)."
          else
            echo "30 gunden yeni, heartbeat commit gerekmez."
          fi
